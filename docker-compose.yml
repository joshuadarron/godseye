services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godseye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godseye}
      POSTGRES_DB: ${POSTGRES_DB:-globaltracker}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  timescaledb_data:
