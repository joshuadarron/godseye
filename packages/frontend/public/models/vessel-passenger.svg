<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Passenger/cruise vessel - top-down view, bow pointing up -->
  <!-- Hull -->
  <path d="M32 4 L24 14 L22 50 L26 58 L38 58 L42 50 L40 14Z" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.8"/>
  <!-- Superstructure decks -->
  <rect x="25" y="14" width="14" height="36" rx="2" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="0.6"/>
  <!-- Windows -->
  <rect x="26" y="16" width="12" height="2" rx="0.5" fill="#42a5f5"/>
  <rect x="26" y="20" width="12" height="2" rx="0.5" fill="#42a5f5"/>
  <rect x="26" y="24" width="12" height="2" rx="0.5" fill="#42a5f5"/>
  <!-- Pool (top deck) -->
  <ellipse cx="32" cy="34" rx="4" ry="3" fill="#64b5f6"/>
  <!-- Funnel -->
  <rect x="30" y="42" width="4" height="5" rx="0.5" fill="#ef5350"/>
</svg>
