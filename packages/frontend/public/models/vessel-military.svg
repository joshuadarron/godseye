<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Military vessel - top-down view, bow pointing up -->
  <!-- Hull (sleek) -->
  <path d="M32 2 L26 12 L24 48 L28 58 L36 58 L40 48 L38 12Z" fill="#616161" stroke="#424242" stroke-width="0.8"/>
  <!-- Bridge -->
  <rect x="28" y="30" width="8" height="10" rx="1" fill="#757575" stroke="#616161" stroke-width="0.6"/>
  <!-- Forward gun turret -->
  <circle cx="32" cy="14" r="3" fill="#9e9e9e" stroke="#757575" stroke-width="0.6"/>
  <line x1="32" y1="14" x2="32" y2="6" stroke="#757575" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Aft gun turret -->
  <circle cx="32" cy="46" r="2.5" fill="#9e9e9e" stroke="#757575" stroke-width="0.5"/>
  <!-- Radar mast -->
  <line x1="28" y1="34" x2="36" y2="34" stroke="#bdbdbd" stroke-width="0.6"/>
  <circle cx="32" cy="34" r="1" fill="#bdbdbd"/>
</svg>
