<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Cessna / high-wing single-engine prop - top-down view, nose up -->
  <!-- Fuselage -->
  <path d="M32 8 C30.5 8 29.5 10 29.5 13 L30 52 C30 55 31 57 32 57 C33 57 34 55 34 52 L34.5 13 C34.5 10 33.5 8 32 8Z" fill="#e0e0e0" stroke="#aaaaaa" stroke-width="0.7"/>
  <!-- High wings (straight, above fuselage) -->
  <path d="M30 24 L6 30 L6 32 L30 28Z" fill="#d0d0d0" stroke="#aaaaaa" stroke-width="0.6"/>
  <path d="M34 24 L58 30 L58 32 L34 28Z" fill="#d0d0d0" stroke="#aaaaaa" stroke-width="0.6"/>
  <!-- Wing struts -->
  <line x1="16" y1="30" x2="30" y2="34" stroke="#bbbbbb" stroke-width="0.5"/>
  <line x1="48" y1="30" x2="34" y2="34" stroke="#bbbbbb" stroke-width="0.5"/>
  <!-- Tail -->
  <path d="M31 50 L24 54 L24 55.5 L31 52Z" fill="#c8c8c8" stroke="#aaaaaa" stroke-width="0.5"/>
  <path d="M33 50 L40 54 L40 55.5 L33 52Z" fill="#c8c8c8" stroke="#aaaaaa" stroke-width="0.5"/>
  <!-- Propeller disc -->
  <ellipse cx="32" cy="9" rx="5" ry="1.5" fill="#999999" opacity="0.5"/>
</svg>
