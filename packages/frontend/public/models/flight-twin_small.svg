  <ellipse cx="18" cy="26.5" rx="4" ry="1.2" fill="#78909c" opacity="0.5"/>
  <ellipse cx="46" cy="26.5" rx="4" ry="1.2" fill="#78909c" opacity="0.5"/>
  <!-- Tail -->
  <path d="M31 49 L23 53 L23 55 L31 52Z" fill="#b0bec5" stroke="#90a4ae" stroke-width="0.5"/>
  <path d="M33 49 L41 53 L41 55 L33 52Z" fill="#b0bec5" stroke="#90a4ae" stroke-width="0.5"/>
