  <ellipse cx="16" cy="30" rx="2" ry="4" fill="#888888" stroke="#666666" stroke-width="0.5"/>
  <ellipse cx="22" cy="28" rx="1.5" ry="3.5" fill="#888888" stroke="#666666" stroke-width="0.5"/>
  <ellipse cx="48" cy="30" rx="2" ry="4" fill="#888888" stroke="#666666" stroke-width="0.5"/>
  <ellipse cx="42" cy="28" rx="1.5" ry="3.5" fill="#888888" stroke="#666666" stroke-width="0.5"/>
